services:
  - type: web
    name: moodcode-api
    runtime: node
    rootDir: .
    buildCommand: npm install && cd shared && npm run compile && cd ../backend && npm run build
    startCommand: node backend/dist/index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 3001
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production